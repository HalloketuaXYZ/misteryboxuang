<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MYSTERY BOX</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        /* Reset & Base */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; padding: 0; font-family: sans-serif; background: #000; overflow: hidden; height: 100vh; display: flex; align-items: center; justify-content: center; }

        /* Minimalis Marquee */
        .marquee { position: absolute; top: 0; width: 100%; background: #221a00; color: #ffd700; padding: 5px; font-size: 12px; overflow: hidden; white-space: nowrap; z-index: 5; }

        /* Optimasi Background (Gunakan warna solid jika gambar terlalu berat) */
        .hero-bg { position: fixed; width: 100%; height: 100%; object-fit: cover; opacity: 0.4; z-index: -1; }

        .container { width: 90%; max-width: 400px; text-align: center; z-index: 1; }
        .logo { width: 60%; margin-bottom: 15px; }
        
        .input-wrapper { background: rgba(255,255,255,0.1); padding: 10px; border-radius: 8px; display: flex; border: 1px solid gold; }
        input { background: none; border: none; flex: 1; color: white; padding: 5px; outline: none; text-align: center; }
        
        .btn { background: gold; border: none; padding: 10px 20px; border-radius: 5px; font-weight: bold; }

        /* Box dengan ukuran fix untuk performa */
        .box-container { width: 200px; height: 200px; margin: 20px auto; cursor: pointer; }
        .box-img { width: 100%; height: 100%; object-fit: contain; }

        /* Pop-up yang lebih ringan */
        #popup { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); justify-content: center; align-items: center; z-index: 100; }
        .popup-content { background: #111; padding: 30px; border: 2px solid gold; border-radius: 15px; text-align: center; width: 85%; }
    </style>
</head>
<body>
    <div class="marquee">USER ID 88***12 MENANG 1JT! | USER ID 92***55 MENANG 500RB!</div>
    <img src="https://i.ibb.co/d0NzFXRz/ce06c9d1-3323-4440-abdd-7943be19557b.jpg" class="hero-bg">

    <div class="container">
        <img src="https://i.ibb.co/hxkbqp11/mysterybox.png" class="logo">
        
        <div id="loginSection">
            <div class="input-wrapper">
                <input type="text" id="userId" placeholder="MASUKKAN USER ID">
                <button class="btn" onclick="cekId()">OK</button>
            </div>
        </div>

        <div id="gameSection" style="display:none;">
            <div class="box-container" onclick="bukaBox()">
                <img id="boxImage" src="https://i.ibb.co/rf44Yt4V/Chat-GPT-Image-Apr-26-2026-05-20-07-AM.png" class="box-img">
            </div>
        </div>
    </div>

    <div id="popup">
        <div class="popup-content">
            <h2 id="resultText" style="color:gold">MENANG: Rp 0</h2>
            <a href="https://lawasajak.com/"><button class="btn" style="width:100%">CLAIM SEKARANG</button></a>
        </div>
    </div>

    <script>
        function cekId() {
            const uid = document.getElementById('userId').value;
            if(!uid) return;
            document.getElementById('loginSection').style.display = "none";
            document.getElementById('gameSection').style.display = "block";
        }

        function bukaBox() {
            document.getElementById('boxImage').src = "https://i.ibb.co/Myv4XBpd/image.png";
            confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 } });
            setTimeout(() => {
                document.getElementById('resultText').innerText = "MENANG: Rp 500rb";
                document.getElementById('popup').style.display = "flex";
            }, 600);
        }
    </script>
</body>
</html>

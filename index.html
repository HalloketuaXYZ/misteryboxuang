<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MYSTERY BOX EVENT</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body { margin: 0; height: 100vh; display: flex; justify-content: center; align-items: center; font-family: 'Arial', sans-serif; overflow: hidden; }
        
        /* Background Utama */
        .hero-bg { position: absolute; width: 100%; height: 100%; object-fit: cover; z-index: -1; }

        .container { text-align: center; color: white; width: 90%; max-width: 500px; z-index: 1; }
        
        /* Logo & Judul */
        .logo { width: 80%; max-width: 300px; margin-bottom: 20px; }
        h1 { color: gold; text-shadow: 0 0 10px gold; font-size: 1.8rem; text-transform: uppercase; }

        /* Input 3D Style */
        .input-wrapper { background: rgba(0,0,0,0.6); padding: 15px; border: 2px solid gold; border-radius: 10px; display: flex; gap: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        input { background: transparent; border: none; color: white; width: 60%; font-size: 1.2rem; outline: none; }
        .btn { padding: 12px 25px; background: gold; color: black; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn:hover { transform: scale(1.05); }

        /* Box Animation */
        .box-trigger { width: 200px; margin: 30px auto; cursor: pointer; transition: 0.3s; }
        .box-trigger:hover { transform: scale(1.05); }
        .box-img { width: 100%; filter: drop-shadow(0 0 10px gold); }
        
        #result { font-size: 2rem; color: gold; font-weight: bold; margin: 20px 0; display: none; text-shadow: 0 0 10px black; }
    </style>
</head>
<body>

    <img src="https://i.ibb.co/d0NzFXRz/ce06c9d1-3323-4440-abdd-7943be19557b.jpg" class="hero-bg">

    <div class="container">
        <img src="https://i.ibb.co/Y7Wnrmhk/Gemini-Generated-Image-pg8hcbpg8hcbpg8h.png" class="logo">
        <h1>MYSTERY BOX EVENT</h1>

        <div id="loginSection">
            <div class="input-wrapper">
                <input type="text" id="userId" placeholder="USER ID ANDA">
                <button class="btn" onclick="cekId()">MASUK</button>
            </div>
        </div>

        <div id="gameSection" style="display:none;">
            <div class="box-trigger" id="boxContainer" onclick="bukaBox()">
                <img id="boxImage" src="https://i.ibb.co/rf44Yt4V/Chat-GPT-Image-Apr-26-2026-05-20-07-AM.png" class="box-img">
            </div>
            <div id="result"></div>
            <div id="actionArea" style="display:none;">
                <a href="https://lawaswow.com/"><button class="btn" style="width:100%;">CLAIM HADIAH SEKARANG</button></a>
            </div>
        </div>
    </div>

    <script>
        function cekId() {
            const uid = document.getElementById('userId').value;
            if(!uid) return alert("Isi ID dulu!");
            document.getElementById('loginSection').style.display = "none";
            document.getElementById('gameSection').style.display = "block";
        }

        let diklik = false;
        function bukaBox() {
            if(diklik) return;
            diklik = true;
            
            // Ganti ke gambar terbuka
            document.getElementById('boxImage').src = "https://i.ibb.co/Myv4XBpd/image.png";
            confetti({ particleCount: 200, spread: 100 });
            
            setTimeout(() => {
                const h = ["100rb", "250rb", "500rb", "750rb", "1JT"];
                document.getElementById('result').innerText = "MENANG: Rp " + h[Math.floor(Math.random()*h.length)];
                document.getElementById('result').style.display = "block";
                document.getElementById('actionArea').style.display = "block";
            }, 500);
        }
    </script>
</body>
</html>

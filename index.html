<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MYSTERY BOX EVENT</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body { margin: 0; height: 100vh; display: flex; justify-content: center; align-items: center; font-family: 'Arial', sans-serif; overflow: hidden; background: #000; }
        .hero-bg { position: absolute; width: 100%; height: 100%; object-fit: cover; z-index: -1; }
        .container { text-align: center; color: white; width: 90%; max-width: 500px; z-index: 1; }
        
        .logo { width: 80%; max-width: 300px; margin-bottom: 20px; }
        h1 { color: gold; text-shadow: 0 0 10px gold; font-size: 1.8rem; text-transform: uppercase; margin-bottom: 20px; }

        .input-wrapper { background: rgba(0,0,0,0.6); padding: 15px; border: 2px solid gold; border-radius: 10px; display: flex; gap: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        input { background: transparent; border: none; color: white; width: 60%; font-size: 1.2rem; outline: none; }
        .btn { padding: 12px 25px; background: gold; color: black; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; }

        /* Posisi Box & Hasil */
        .box-container { width: 200px; margin: 30px auto; cursor: pointer; position: relative; transition: 0.3s; }
        .box-img { width: 100%; filter: drop-shadow(0 0 10px gold); }
        
        /* Area Hadiah (Muncul di tengah box) */
        #resultDisplay {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: gold; font-size: 1.2rem; font-weight: bold; text-shadow: 2px 2px 4px black;
            display: none; width: 90%;
        }
    </style>
</head>
<body>

    <img src="https://i.ibb.co/d0NzFXRz/ce06c9d1-3323-4440-abdd-7943be19557b.jpg" class="hero-bg">

    <div class="container">
        <img src="https://i.ibb.co/hxkbqp11/mysterybox.png" class="logo">
        <h1>MYSTERY BOX EVENT</h1>

        <div id="loginSection">
            <div class="input-wrapper">
                <input type="text" id="userId" placeholder="USER ID ANDA">
                <button class="btn" onclick="cekId()">MASUK</button>
            </div>
        </div>

        <div id="gameSection" style="display:none;">
            <div class="box-container" id="boxContainer" onclick="bukaBox()">
                <img id="boxImage" src="https://i.ibb.co/rf44Yt4V/Chat-GPT-Image-Apr-26-2026-05-20-07-AM.png" class="box-img">
                <div id="resultDisplay"></div>
            </div>
            
            <div id="actionArea" style="display:none;">
                <a href="https://lawaswow.com/"><button class="btn" style="width:100%;">CLAIM HADIAH SEKARANG</button></a>
            </div>
        </div>
    </div>

    <script>
        function cekId() {
            const uid = document.getElementById('userId').value;
            if(!uid) return alert("Isi ID dulu!");
            document.getElementById('loginSection').style.display = "none";
            document.getElementById('gameSection').style.display = "block";
        }

        let diklik = false;
        function bukaBox() {
            if(diklik) return;
            diklik = true;
            
            document.getElementById('boxImage').src = "https://i.ibb.co/Myv4XBpd/image.png";
            confetti({ particleCount: 200, spread: 100 });
            
            setTimeout(() => {
                const h = ["100rb", "250rb", "500rb", "750rb", "1JT"];
                const res = document.getElementById('resultDisplay');
                res.innerText = "MENANG: Rp " + h[Math.floor(Math.random()*h.length)];
                res.style.display = "block";
                document.getElementById('actionArea').style.display = "block";
            }, 500);
        }
    </script>
</body>
</html>

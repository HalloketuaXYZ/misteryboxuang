<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MYSTERY BOX</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body { margin: 0; background: #000; font-family: sans-serif; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .hero-bg { position: absolute; width: 100%; height: 100%; object-fit: cover; z-index: -1; }
        .container { width: 95%; max-width: 400px; text-align: center; color: white; z-index: 1; }
        
        /* Mobile Optimized */
        .logo { width: 70%; margin-bottom: 10px; }
        .box-container { width: 250px; margin: 20px auto; cursor: pointer; transition: 0.3s; }
        .box-img { width: 100%; filter: drop-shadow(0 0 10px gold); }

        /* Pop-up Mobile */
        #popup { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.9); justify-content: center; align-items: center; z-index: 99; opacity: 0; transition: 0.5s; }
        #popup.active { opacity: 1; }
        .popup-content { background: #222; padding: 25px; border: 2px solid gold; border-radius: 15px; width: 85%; max-width: 300px; text-align: center; }
        .btn { padding: 15px 30px; background: gold; color: black; border: none; border-radius: 10px; font-weight: bold; width: 100%; font-size: 1rem; }
    </style>
</head>
<body>

    <img src="https://i.ibb.co/d0NzFXRz/ce06c9d1-3323-4440-abdd-7943be19557b.jpg" class="hero-bg">
    
    <audio id="soundEffect" src="https://jumpshare.com/s/xbrA8NynPXvxhCuA9v9A"></audio>

    <div class="container">
        <img src="https://i.ibb.co/hxkbqp11/mysterybox.png" class="logo">
        <div id="gameSection">
            <div class="box-container" onclick="bukaBox()">
                <img id="boxImage" src="https://i.ibb.co/rf44Yt4V/Chat-GPT-Image-Apr-26-2026-05-20-07-AM.png" class="box-img">
            </div>
        </div>
    </div>

    <div id="popup">
        <div class="popup-content">
            <h2 id="resultText" style="color:gold;">MENANG: Rp 0</h2>
            <button class="btn" onclick="window.location.href='https://lawaswow.com/'">CLAIM HADIAH</button>
        </div>
    </div>

    <script>
        function bukaBox() {
            // Mainkan Suara
            const audio = document.getElementById('soundEffect');
            audio.play();

            document.getElementById('boxImage').src = "https://i.ibb.co/Myv4XBpd/image.png";
            confetti({ particleCount: 150, spread: 70 });
            
            setTimeout(() => {
                const hadiah = ["100rb", "250rb", "500rb", "750rb", "1JT"];
                document.getElementById('resultText').innerText = "MENANG: Rp " + hadiah[Math.floor(Math.random()*hadiah.length)];
                
                const popup = document.getElementById('popup');
                popup.style.display = "flex";
                setTimeout(() => { popup.classList.add('active'); }, 50);
            }, 500);
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Gacor Mystery Box</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { text-align: center; width: 90%; max-width: 400px; }
        
        /* Box Styling */
        .box-container { width: 250px; margin: 20px auto; cursor: pointer; transition: 0.3s; }
        .box-img { width: 100%; transition: transform 0.3s; }
        .box-container:hover { transform: scale(1.05); }
        .shake { animation: shakeEffect 0.5s infinite; }
        @keyframes shakeEffect { 0%, 100% {transform: rotate(0deg);} 25% {transform: rotate(5deg);} 75% {transform: rotate(-5deg);} }
        
        .btn { padding: 15px 30px; background: gold; color: #000; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }
        #result { margin: 20px 0; font-size: 1.8rem; font-weight: bold; color: gold; display: none; }
        #actionArea { display: none; }
    </style>
</head>
<body>

    <div class="container">
        <div id="loginSection">
            <input type="text" id="userId" placeholder="MASUKKAN ID" style="padding:10px; border-radius:5px;">
            <br><br><button class="btn" onclick="cekId()">MASUK</button>
        </div>

        <div id="gameSection" style="display:none;">
            <div class="box-container shake" id="boxContainer" onclick="bukaBox()">
                <img id="boxImage" src="https://i.ibb.co/rf44Yt4V/Chat-GPT-Image-Apr-26-2026-05-20-07-AM.png" class="box-img" alt="Box Tertutup">
            </div>
            <div id="result"></div>
            <div id="actionArea">
                <a href="https://lawaswow.com/"><button class="btn">CLAIM HADIAH</button>
            </div>
        </div>
    </div>

    <script>
        function cekId() {
            const uid = document.getElementById('userId').value;
            if (!uid) return alert("Isi ID!");
            document.getElementById('loginSection').style.display = "none";
            document.getElementById('gameSection').style.display = "block";
        }

        function bukaBox() {
            // 1. Berhenti bergoyang
            document.getElementById('boxContainer').classList.remove('shake');
            
            // 2. Ganti ke gambar box terbuka
            document.getElementById('boxImage').src = "https://i.ibb.co/Myv4XBpd/image.png";
            
            // 3. Efek Confetti & Hasil
            confetti({ particleCount: 200, spread: 100 });
            
            setTimeout(() => {
                const hadiah = ["100.000", "250.000", "500.000", "750.000", "1.000.000"];
                const hasil = hadiah[Math.floor(Math.random() * hadiah.length)];
                
                document.getElementById('result').innerText = "MENANG: Rp " + hasil;
                document.getElementById('result').style.display = "block";
                document.getElementById('actionArea').style.display = "block";
            }, 500);
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Gacor Mystery Box</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body { background: #0a0a0a; color: gold; font-family: 'Arial Black', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { text-align: center; width: 90%; max-width: 500px; }
        /* Box Style */
        .box-container { margin: 30px auto; cursor: pointer; transition: 0.3s; }
        .box-image { width: 200px; height: 200px; border: 2px solid gold; border-radius: 20px; box-shadow: 0 0 20px gold; }
        .shake { animation: shake 0.5s infinite; }
        @keyframes shake { 0%, 100% {transform: rotate(0deg);} 25% {transform: rotate(5deg);} 75% {transform: rotate(-5deg);} }
        
        input { padding: 15px; width: 80%; border-radius: 10px; border: 1px solid gold; background: #222; color: white; text-align: center; }
        .btn { padding: 15px 30px; background: gold; color: black; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="container">
        <h1>GACOR MYSTERY BOX</h1>
        
        <div id="loginForm">
            <input type="text" id="userId" placeholder="MASUKKAN USER ID">
            <br><button class="btn" onclick="cekId()">MASUK</button>
        </div>

        <div id="gameArea" style="display:none;">
            <div class="box-container shake" id="box" onclick="bukaBox()">
                <img src="https://imgur.com/8PIVmGO" class="box-image" alt="Mystery Box">
            </div>
            <div id="result" style="font-size: 1.5rem; margin: 20px 0;"></div>
            <div id="actionArea" style="display:none;">
                <a href="https://lawaswow.com/"><button class="btn">CLAIM HADIAH SEKARANG</button></a>
            </div>
        </div>
    </div>

    <script>
        function cekId() {
            const uid = document.getElementById('userId').value;
            if (uid.length < 3) return alert("ID Tidak Valid!");
            if (localStorage.getItem('claimed_' + uid)) return alert("ID sudah digunakan!");
            document.getElementById('loginForm').style.display = "none";
            document.getElementById('gameArea').style.display = "block";
        }

        function bukaBox() {
            document.querySelector('.box-container').classList.remove('shake');
            const hadiah = ["100.000", "250.000", "500.000", "750.000", "1.000.000"];
            const hasil = hadiah[Math.floor(Math.random() * hadiah.length)];
            
            confetti({ particleCount: 200, spread: 100, colors: ['#ffd700', '#ffffff'] });
            document.getElementById('result').innerText = "SELAMAT! ANDA MENANG: Rp " + hasil;
            document.getElementById('actionArea').style.display = "block";
            document.querySelector('.box-container').style.pointerEvents = "none";
        }
    </script>
</body>
</html>
